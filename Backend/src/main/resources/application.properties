spring.application.name=studysync
server.port=8080

# In-memory H2 Database configuration (Disabled)
# spring.datasource.url=jdbc:h2:mem:studysyncdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Aiven MySQL Database Configuration
spring.datasource.url= ${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password= ${DB_PASSWORD}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate / JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 console access
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# CORS Configuration (defaults to localhost frontend, can be overridden via environment variables on Render)
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
